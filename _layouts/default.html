<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title %}
        {{ page.title | escape }} | {{ site.title | escape }}
      {% else %}
        {{ site.title | escape }}
      {% endif %}
    </title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color mode" aria-pressed="false">
          Dark
        </button>
      </header>

      <main class="site-content" aria-label="Content">
        {{ content }}
      </main>

      <footer class="site-footer">
        {% if site.description and site.description != "" %}
          <p>{{ site.description }}</p>
        {% endif %}
      </footer>
    </div>

    <script>
      (function () {
        var storageKey = 'color-theme';
        var root = document.documentElement;
        var button = document.getElementById('theme-toggle');

        function applyTheme(theme) {
          root.setAttribute('data-theme', theme);
          if (button) {
            button.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
            button.textContent = theme === 'dark' ? 'Light' : 'Dark';
          }
          localStorage.setItem(storageKey, theme);
        }

        var saved = localStorage.getItem(storageKey);
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var initial = saved || (prefersDark ? 'dark' : 'light');
        applyTheme(initial);

        if (button) {
          button.addEventListener('click', function () {
            var current = root.getAttribute('data-theme') || 'light';
            applyTheme(current === 'dark' ? 'light' : 'dark');
          });
        }
      })();
    </script>
  </body>
</html>
